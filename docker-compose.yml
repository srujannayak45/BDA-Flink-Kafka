# ===================================================
# Real-Time AI Game Commentator - Docker Compose
# ===================================================

services:
  # ==================== INFRASTRUCTURE ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/create-topics.sh
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    networks:
      - game-network

  # ==================== FLINK CLUSTER ====================

  jobmanager:
    build:
      context: ./flink-processor
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 10000
    networks:
      - game-network
    depends_on:
      kafka:
        condition: service_healthy

  taskmanager:
    build:
      context: ./flink-processor
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
    networks:
      - game-network

  flink-job-submit:
    build:
      context: ./flink-processor
      dockerfile: Dockerfile
    container_name: flink-job-submit
    depends_on:
      - jobmanager
      - taskmanager
      - kafka-init
    command: >
      bash -c "
        echo '⏳ Waiting for Flink JobManager to be ready...' &&
        sleep 30 &&
        echo '🚀 Submitting Flink job...' &&
        /opt/flink/bin/flink run -d /opt/flink/usrlib/game-commentator.jar &&
        echo '✅ Flink job submitted!' &&
        tail -f /dev/null
      "
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    networks:
      - game-network

  # ==================== APPLICATION SERVICES ====================

  # Old battle game simulator — disabled (browser cricket game replaces it)
  # To re-enable, run: docker-compose --profile legacy up game-simulator
  game-simulator:
    build:
      context: ./game-simulator
      dockerfile: Dockerfile
    container_name: game-simulator
    profiles: ["legacy"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=game-events
      - GAME_TICK_MIN_MS=500
      - GAME_TICK_MAX_MS=1000
      - GAME_NUM_PLAYERS=5
      - GAME_MAP_SIZE=1000
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - game-network
    restart: on-failure

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "3001:3001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_COMMENTARY=commentary
      - KAFKA_TOPIC_GAME_STATS=game-stats
      - KAFKA_TOPIC_GAME_EVENTS=game-events
      - PORT=3001
      - TTS_URL=http://tts-service:5000
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - game-network
    restart: on-failure

  tts-service:
    build:
      context: ./tts-service
      dockerfile: Dockerfile
    container_name: tts-service
    ports:
      - "5001:5000"
    environment:
      - TTS_PORT=5000
      - COQUI_TOS_AGREED=1
      - REFERENCE_AUDIO=/app/data/reference/reference_commentary_clean.wav
    volumes:
      # Map host data dir so preprocessed audio is saved
      - ./tts-service/data:/app/data
      # Persist model cache so it doesn't re-download every restart
      - tts-model-cache:/root/.local/share/tts
    networks:
      - game-network
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 4G

  frontend-ui:
    build:
      context: ./frontend-ui
      dockerfile: Dockerfile
    container_name: frontend-ui
    ports:
      - "3000:80"
    depends_on:
      - backend-api
    networks:
      - game-network
    restart: on-failure

networks:
  game-network:
    driver: bridge
    name: game-commentator-network

volumes:
  tts-model-cache:
    driver: local
